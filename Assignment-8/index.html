<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
       <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h2 class="mb-4">To-Do-List</h2>
        <form id="userForm" class="mb-4">
            <input type="hidden" id="userid"/>
            <div class="mb-2">
                <input type="date" id="date" class="form-control" placeholder="Enter ur To Do date.." required /><br>
                <input type="text" id="content" class="form-control" placeholder="Enter ur To Do content.." required/>
                        </div>
                        <div class="mb-2">
                        </div>
                        <button type="submit" class="btn btn-primary">SAVE</button>
        </form>
        <ul id="userlist" class="list-group">

        </ul>
        <script src="script.js"></script>
    </div>
</body>
</html>
